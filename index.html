        <hr>
        <div id="manage-fen">
            <h3 class="middle-text">포지션 FEN</h3>

            <h3 class="middle-text">현재 포지션</h3>
            <p id="current-fen">rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR</p>

        </div>

        <hr>
       
        <h3 class="middle-text">글 작성</h3>
        <div id="new-post">
            <!-- <label>제목</label> -->

            <!-- <label>내용</label> -->

            <button id="upload-post">글 작성</button>
        </div>

        <hr>
        <button id="find-post">이 포지션의 글 확인하기</button>


        <div id="select-post-mode-parent" hidden>
            <div id="select-post-mode">
                <p id="post-mode-text">글 표시 순서</p>
                <input type="radio" id="new" name="post-mode" value="new" checked>
                <label for="new">최신순</label>
                <input type="radio" id="old" name="post-mode" value="old">
                <label for="old">오래된순</label>
            </div>
            
        </div>
